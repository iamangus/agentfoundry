{{define "navbar"}}
<style>
  .nav-tab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    color: hsl(var(--muted-foreground));
    transition: background 0.15s, color 0.15s;
  }
  .nav-tab:hover {
    background: hsl(var(--muted) / 0.7);
    color: hsl(var(--foreground));
  }
  .nav-tab.active {
    background: hsl(var(--muted));
    color: hsl(var(--foreground));
  }
  .nav-tab svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }
</style>
<nav class="border-b bg-background/95 backdrop-blur-sm" style="min-height: 52px; display: flex; align-items: center; padding: 0 20px; gap: 16px;">
  <a class="text-sm font-semibold tracking-tight" href="/" style="text-decoration: none;">
    <span style="color: hsl(var(--foreground));">agent</span><span style="color: hsl(var(--primary));">file</span>
  </a>

  <div style="display: flex; align-items: center; gap: 4px; background: hsl(var(--muted) / 0.4); border: 1px solid hsl(var(--border)); border-radius: 9px; padding: 3px;">
    <a href="/chat" class="nav-tab {{if eq .ActivePage "chat"}}active{{end}}">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      Chat
    </a>
    <a href="/agents" class="nav-tab {{if eq .ActivePage "agents"}}active{{end}}">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path>
      </svg>
      Agents
    </a>
    <a href="/tools" class="nav-tab {{if eq .ActivePage "tools"}}active{{end}}">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
      </svg>
      Tools
    </a>
  </div>
</nav>
{{end}}
