listen: ":3000"
definitions_dir: "./definitions"

# LLM provider configuration.
# Works with any OpenAI-compatible API (OpenRouter, OpenAI, Ollama, Azure, etc.)
llm:
  # Base URL for the API. The client appends "/chat/completions".
  # Defaults to OpenRouter if omitted.
  base_url: "https://openrouter.ai/api/v1"

  # API key for authentication (Bearer token).
  # Use ${ENV_VAR} to read from an environment variable.
  api_key: "${OPENROUTER_API_KEY}"

  # Default model used when an agent definition doesn't specify one.
  default_model: "openai/gpt-4o"

  # Extra headers sent with every request.
  # Useful for provider-specific headers (e.g. OpenRouter attribution).
  headers:
    HTTP-Referer: "https://github.com/angoo/agentfile"
    X-Title: "agentfile"

  # Set to true if your provider supports JSON Schema response_format
  # (e.g. OpenAI, OpenRouter). When false (default), schemas are injected
  # into the system prompt for providers that only support json_object mode.
  # schema_validation: true

# Other provider examples:
#
# OpenAI directly:
#   llm:
#     base_url: "https://api.openai.com/v1"
#     api_key: "${OPENAI_API_KEY}"
#     default_model: "gpt-4o"
#
# Ollama (local):
#   llm:
#     base_url: "http://localhost:11434/v1"
#     api_key: "ollama"
#     default_model: "llama3"
#
# Azure OpenAI:
#   llm:
#     base_url: "https://YOUR_RESOURCE.openai.azure.com/openai/deployments/YOUR_DEPLOYMENT"
#     api_key: "${AZURE_OPENAI_API_KEY}"
#     default_model: "gpt-4o"
#     headers:
#       api-version: "2024-02-01"
#
# Together AI:
#   llm:
#     base_url: "https://api.together.xyz/v1"
#     api_key: "${TOGETHER_API_KEY}"
#     default_model: "meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo"

# Legacy format (still supported for backward compatibility):
# openrouter:
#   api_key: "${OPENROUTER_API_KEY}"
#   default_model: "openai/gpt-4o"

# External MCP servers to connect to and discover tools from.
# All tools from these servers become available to agents via "server.tool" syntax.
#
# Supported transports:
#   - "sse"              (default) — legacy SSE-based MCP servers
#   - "streamable-http"  — newer Streamable HTTP MCP servers
mcp_servers:
  - name: "srvd"
    url: "https://mcp.srvd.dev/mcp"
    transport: "streamable-http"

  # More examples:
  # - name: "filesystem"
  #   url: "http://localhost:4000/sse"
  #   transport: "sse"
  # - name: "github"
  #   url: "http://localhost:4001/sse"
  #
  # To authenticate with a bearer token, add a headers map.
  # Use ${ENV_VAR} to read the value from an environment variable.
  # - name: "my-auth-server"
  #   url: "https://mcp.example.com/mcp"
  #   transport: "streamable-http"
  #   headers:
  #     Authorization: "Bearer ${MY_API_TOKEN}"
